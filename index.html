<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>prep-coach</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f4f1ea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="prep-coach" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◎</span>
      <span class="brand-name">prep-coach</span>
      <span class="brand-tag" id="goalTag">SQL sprint</span>
    </div>
    <nav class="nav" id="nav">
      <a href="#/today" data-route="today">Today</a>
      <a href="#/plan" data-route="plan">Plan</a>
      <a href="#/jobs" data-route="jobs">Job search</a>
      <a href="#/config" data-route="config">Setup</a>
    </nav>
    <div class="topbar-right"></div>
  </header>

  <main id="view" class="view"><!-- routed content --></main>

  <footer class="footer">
    <span id="ead-mini"></span>
    <span class="dot">·</span>
    <button class="linklike" id="exportData">Backup data</button>
    <span class="dot">·</span>
    <button class="linklike" id="importData">Restore</button>
    <span class="dot">·</span>
    <button class="linklike danger" id="resetData">Reset all</button>
    <input type="file" id="importFile" accept="application/json" hidden />
  </footer>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW registration failed', e));
      });
    }
  </script>
</body>
</html>
